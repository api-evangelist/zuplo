naftiko: 1.0.0-alpha2
info:
  label: Map Okta groups to Zuplo API key buckets
  description: When an Okta user changes group membership, update the corresponding Zuplo key-bucket consumer to scope the edge gateway access to the right tier.
  tags:
  - Zuplo
  - Integration
  - Identity
  - okta
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    OKTA_API_KEY: OKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}
      operations:
      - name: updatekeyconsumer
        method: PATCH
        description: Update a Zuplo key-bucket consumer when the Okta group changes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}/roll-key
      operations:
      - name: rollkey
        method: POST
        description: Roll the API key when the user is removed from the group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: okta
    baseUri: https://yourdomain.okta.com
    description: Okta API operations consumed by this integration.
    resources:
    - name: api-v1-groups-groupid-users
      path: /api/v1/groups/{groupId}/users
      operations:
      - name: listgroupusers
        method: GET
        description: 'Okta API: listGroupUsers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: Path parameter groupId.
          required: true
    - name: api-v1-users-userid
      path: /api/v1/users/{userId}
      operations:
      - name: getuser
        method: GET
        description: 'Okta API: getUser'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-okta-mcp
    description: MCP adapter for the zuplo-okta integration.
    tools:
    - name: zuplo_okta
      description: Execute the zuplo okta integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-okta-rest
    port: 8080
    description: REST adapter for the zuplo-okta integration.
    resources:
    - path: /zuplo-okta
      name: zuplo-okta
      description: REST surface for the zuplo-okta integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-okta integration.
        call: zuplo_okta
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
