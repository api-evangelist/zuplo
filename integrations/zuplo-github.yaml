naftiko: 1.0.0-alpha2
info:
  label: Sync Zuplo route configuration from a GitHub repository
  description: On push to main, fetch the OpenAPI document from a GitHub repo and trigger a Zuplo deployment so the edge gateway tracks source-of-truth in Git.
  tags:
  - Zuplo
  - Integration
  - DevOps
  - github
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-deployments-sources
      path: /v1/deployments/sources
      operations:
      - name: createdeploymentsource
        method: POST
        description: Create a new Zuplo deployment source from the GitHub spec.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-deployments-deploymentname-deploy
      path: /v1/deployments/{deploymentName}/deploy
      operations:
      - name: deployzuplo
        method: POST
        description: Trigger a Zuplo deployment after the GitHub spec changes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deploymentName
          in: path
          type: string
          description: Path parameter deploymentName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: github
    baseUri: https://api.github.com
    description: GitHub REST API operations consumed by this integration.
    resources:
    - name: repos-owner-repo-contents-path
      path: /repos/{owner}/{repo}/contents/{path}
      operations:
      - name: getrepocontent
        method: GET
        description: 'GitHub REST API: getRepoContent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: Path parameter owner.
          required: true
        - name: repo
          in: path
          type: string
          description: Path parameter repo.
          required: true
        - name: path
          in: path
          type: string
          description: Path parameter path.
          required: true
    - name: repos-owner-repo-commits-ref
      path: /repos/{owner}/{repo}/commits/{ref}
      operations:
      - name: getcommit
        method: GET
        description: 'GitHub REST API: getCommit'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: Path parameter owner.
          required: true
        - name: repo
          in: path
          type: string
          description: Path parameter repo.
          required: true
        - name: ref
          in: path
          type: string
          description: Path parameter ref.
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-github-mcp
    description: MCP adapter for the zuplo-github integration.
    tools:
    - name: zuplo_github
      description: Execute the zuplo github integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-github-rest
    port: 8080
    description: REST adapter for the zuplo-github integration.
    resources:
    - path: /zuplo-github
      name: zuplo-github
      description: REST surface for the zuplo-github integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-github integration.
        call: zuplo_github
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
