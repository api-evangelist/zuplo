naftiko: 1.0.0-alpha2
info:
  label: Ship Zuplo edge gateway logs to Datadog
  description: Stream Zuplo audit logs and request telemetry to Datadog so the edge gateway shows up alongside the rest of the application stack.
  tags:
  - Zuplo
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-audit-logs
      path: /v1/accounts/{accountName}/audit-logs
      operations:
      - name: listauditlogs
        method: GET
        description: Read recent Zuplo audit log entries to forward to Datadog.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
  - type: http
    namespace: datadog
    baseUri: https://http-intake.logs.datadoghq.com
    description: Datadog Logs API operations consumed by this integration.
    resources:
    - name: api-v2-logs
      path: /api/v2/logs
      operations:
      - name: submitlogs
        method: POST
        description: 'Datadog Logs API: submitLogs'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-datadog-mcp
    description: MCP adapter for the zuplo-datadog integration.
    tools:
    - name: zuplo_datadog
      description: Execute the zuplo datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-datadog-rest
    port: 8080
    description: REST adapter for the zuplo-datadog integration.
    resources:
    - path: /zuplo-datadog
      name: zuplo-datadog
      description: REST surface for the zuplo-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-datadog integration.
        call: zuplo_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
