naftiko: 1.0.0-alpha2
info:
  label: Proxy OpenAI through Zuplo with per-consumer rate limits
  description: Front OpenAI's Chat Completions API with a Zuplo edge gateway so each downstream consumer has its own scoped key, quota, and usage record at the edge.
  tags:
  - Zuplo
  - Integration
  - AI
  - openai
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}
      operations:
      - name: getkeyconsumer
        method: GET
        description: Resolve the Zuplo consumer making the OpenAI call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}/keys
      operations:
      - name: createapikey
        method: POST
        description: Mint a per-consumer key used to call OpenAI through Zuplo.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: openai
    baseUri: https://api.openai.com
    description: OpenAI API operations consumed by this integration.
    resources:
    - name: v1-chat-completions
      path: /v1/chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: 'OpenAI API: createChatCompletion'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-openai-mcp
    description: MCP adapter for the zuplo-openai integration.
    tools:
    - name: zuplo_openai
      description: Execute the zuplo openai integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-openai-rest
    port: 8080
    description: REST adapter for the zuplo-openai integration.
    resources:
    - path: /zuplo-openai
      name: zuplo-openai
      description: REST surface for the zuplo-openai integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-openai integration.
        call: zuplo_openai
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
