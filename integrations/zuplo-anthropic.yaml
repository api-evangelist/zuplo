naftiko: 1.0.0-alpha2
info:
  label: Proxy Anthropic Claude through a Zuplo edge gateway
  description: Front the Anthropic Messages API with a Zuplo edge gateway so per-customer API keys, rate limits, and audit logs are enforced before requests hit Anthropic.
  tags:
  - Zuplo
  - Integration
  - AI
  - anthropic
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}/keys
      operations:
      - name: listconsumerkeys
        method: GET
        description: Resolve the calling Zuplo consumer's API keys before proxying.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
    - name: v1-accounts-accountname-audit-logs
      path: /v1/accounts/{accountName}/audit-logs
      operations:
      - name: listauditlogs
        method: GET
        description: Capture the proxied request in Zuplo audit logs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
  - type: http
    namespace: anthropic
    baseUri: https://api.anthropic.com
    description: Anthropic Messages API operations consumed by this integration.
    resources:
    - name: v1-messages
      path: /v1/messages
      operations:
      - name: createmessage
        method: POST
        description: 'Anthropic Messages API: createMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-anthropic-mcp
    description: MCP adapter for the zuplo-anthropic integration.
    tools:
    - name: zuplo_anthropic
      description: Execute the zuplo anthropic integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-anthropic-rest
    port: 8080
    description: REST adapter for the zuplo-anthropic integration.
    resources:
    - path: /zuplo-anthropic
      name: zuplo-anthropic
      description: REST surface for the zuplo-anthropic integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-anthropic integration.
        call: zuplo_anthropic
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
