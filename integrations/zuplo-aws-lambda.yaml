naftiko: 1.0.0-alpha2
info:
  label: Route Zuplo edge requests to AWS Lambda upstreams
  description: Treat AWS Lambda functions as upstream handlers for a Zuplo edge route — Zuplo enforces auth, rate limits, and audit logging in front of Lambda.
  tags:
  - Zuplo
  - Integration
  - Upstream
  - aws-lambda
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    AWS_LAMBDA_API_KEY: AWS_LAMBDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-projects-projectname-deployments
      path: /v1/accounts/{accountName}/projects/{projectName}/deployments
      operations:
      - name: createdeployment
        method: POST
        description: Deploy or update the Zuplo route that proxies to Lambda.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: projectName
          in: path
          type: string
          description: Path parameter projectName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-accountname-projects-projectname-branches-branch
      path: /v1/accounts/{accountName}/projects/{projectName}/branches/{branchName}/variables
      operations:
      - name: createvariable
        method: POST
        description: Set the Lambda upstream ARN as a Zuplo deployment variable.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: projectName
          in: path
          type: string
          description: Path parameter projectName.
          required: true
        - name: branchName
          in: path
          type: string
          description: Path parameter branchName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: aws-lambda
    baseUri: https://lambda.us-east-1.amazonaws.com
    description: AWS Lambda API operations consumed by this integration.
    resources:
    - name: 2015-03-31-functions-functionname-invocations
      path: /2015-03-31/functions/{FunctionName}/invocations
      operations:
      - name: invokefunction
        method: POST
        description: 'AWS Lambda API: invokeFunction'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FunctionName
          in: path
          type: string
          description: Path parameter FunctionName.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-aws-lambda-mcp
    description: MCP adapter for the zuplo-aws-lambda integration.
    tools:
    - name: zuplo_aws_lambda
      description: Execute the zuplo aws lambda integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-aws-lambda-rest
    port: 8080
    description: REST adapter for the zuplo-aws-lambda integration.
    resources:
    - path: /zuplo-aws-lambda
      name: zuplo-aws-lambda
      description: REST surface for the zuplo-aws-lambda integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-aws-lambda integration.
        call: zuplo_aws_lambda
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
