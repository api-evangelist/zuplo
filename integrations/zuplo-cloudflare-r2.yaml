naftiko: 1.0.0-alpha2
info:
  label: Front Cloudflare R2 buckets with a Zuplo edge gateway
  description: Use Zuplo as the public read/write API in front of a private Cloudflare R2 bucket so API keys, rate limits, and audit logs are enforced before object access.
  tags:
  - Zuplo
  - Integration
  - Storage
  - cloudflare-r2
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
    CLOUDFLARE_R2_API_KEY: CLOUDFLARE_R2_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo
    baseUri: https://dev.zuplo.com
    description: Zuplo API operations consumed by this integration.
    resources:
    - name: v1-accounts-accountname-key-buckets-bucketname-consumers-con
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}
      operations:
      - name: getkeyconsumer
        method: GET
        description: Resolve the Zuplo consumer requesting an R2 object.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Path parameter accountName.
          required: true
        - name: bucketName
          in: path
          type: string
          description: Path parameter bucketName.
          required: true
        - name: consumerName
          in: path
          type: string
          description: Path parameter consumerName.
          required: true
  - type: http
    namespace: cloudflare-r2
    baseUri: https://{account_id}.r2.cloudflarestorage.com
    description: Cloudflare R2 S3-Compatible API operations consumed by this integration.
    resources:
    - name: bucket-object
      path: /{bucket}/{object}
      operations:
      - name: getobject
        method: GET
        description: 'Cloudflare R2 S3-Compatible API: getObject'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucket
          in: path
          type: string
          description: Path parameter bucket.
          required: true
        - name: object
          in: path
          type: string
          description: Path parameter object.
          required: true
    - name: bucket-object
      path: /{bucket}/{object}
      operations:
      - name: putobject
        method: PUT
        description: 'Cloudflare R2 S3-Compatible API: putObject'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucket
          in: path
          type: string
          description: Path parameter bucket.
          required: true
        - name: object
          in: path
          type: string
          description: Path parameter object.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: zuplo-cloudflare-r2-mcp
    description: MCP adapter for the zuplo-cloudflare-r2 integration.
    tools:
    - name: zuplo_cloudflare_r2
      description: Execute the zuplo cloudflare r2 integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: zuplo-cloudflare-r2-rest
    port: 8080
    description: REST adapter for the zuplo-cloudflare-r2 integration.
    resources:
    - path: /zuplo-cloudflare-r2
      name: zuplo-cloudflare-r2
      description: REST surface for the zuplo-cloudflare-r2 integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the zuplo-cloudflare-r2 integration.
        call: zuplo_cloudflare_r2
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
