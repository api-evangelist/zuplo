naftiko: 1.0.0-alpha2
info:
  label: Zuplo Developer API — MCP Servers
  description: 'Zuplo Developer API — MCP Servers. 1 operations. Lead operation: Docs MCP Server. Self-contained Naftiko capability
    covering one Zuplo business surface.'
  tags:
  - Zuplo
  - MCP Servers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo-mcp-servers
    baseUri: https://dev.zuplo.com
    description: Zuplo Developer API — MCP Servers business capability. Self-contained, no shared references.
    resources:
    - name: mcp-docs
      path: /mcp/docs
      operations:
      - name: mcpservicepost
        method: POST
        description: Docs MCP Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZUPLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zuplo-mcp-servers-rest
    port: 8080
    description: REST adapter for Zuplo Developer API — MCP Servers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mcp/docs
      name: mcp-docs
      description: REST surface for mcp-docs.
      operations:
      - method: POST
        name: mcpservicepost
        description: Docs MCP Server
        call: zuplo-mcp-servers.mcpservicepost
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zuplo-mcp-servers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zuplo Developer API — MCP Servers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: docs-mcp-server
      description: Docs MCP Server
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zuplo-mcp-servers.mcpservicepost
      outputParameters:
      - type: object
        mapping: $.
