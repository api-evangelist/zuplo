naftiko: 1.0.0-alpha2
info:
  label: Zuplo Developer API — API Keys - Managers
  description: 'Zuplo Developer API — API Keys - Managers. 3 operations. Lead operation: Lists Managers. Self-contained Naftiko
    capability covering one Zuplo business surface.'
  tags:
  - Zuplo
  - API Keys - Managers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
capability:
