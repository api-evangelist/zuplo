  - type: http
    namespace: zuplo-api-keys-managers
    baseUri: https://dev.zuplo.com
    description: Zuplo Developer API — API Keys - Managers business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounts-accountName-key-buckets-bucketName-consumers-consumerName-managers
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}/managers
      operations:
      - name: apikeyconsumermanagerslist
        method: GET
        description: Lists Managers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: 'The maximum number of entries to return. If the value exceeds the maximum, then the maximum value
            will be used. Default: 1000'
          required: true
        - name: offset
          in: query
          type: integer
          description: 'The offset of the first item returned in the collection. Default: 0'
          required: true
      - name: apikeyconsumermanagerscreate
        method: POST
        description: Creates a Manager
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-accountName-key-buckets-bucketName-consumers-consumerName-managers-m
      path: /v1/accounts/{accountName}/key-buckets/{bucketName}/consumers/{consumerName}/managers/{managerId}
      operations:
      - name: apikeyconsumermanagersdelete
        method: DELETE
        description: Deletes a Manager
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZUPLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zuplo-api-keys-managers-rest
    port: 8080
    description: REST adapter for Zuplo Developer API — API Keys - Managers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/accounts/{accountname}/key-buckets/{bucketname}/consumers/{consumername}/managers
      name: v1-accounts-accountname-key-buckets-bucketname-consumers-consumername-managers
      description: REST surface for v1-accounts-accountName-key-buckets-bucketName-consumers-consumerName-managers.
      operations:
      - method: GET
        name: apikeyconsumermanagerslist
        description: Lists Managers
        call: zuplo-api-keys-managers.apikeyconsumermanagerslist
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: apikeyconsumermanagerscreate
        description: Creates a Manager
        call: zuplo-api-keys-managers.apikeyconsumermanagerscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accounts/{accountname}/key-buckets/{bucketname}/consumers/{consumername}/managers/{managerid}
      name: v1-accounts-accountname-key-buckets-bucketname-consumers-consumername-managers-m
      description: REST surface for v1-accounts-accountName-key-buckets-bucketName-consumers-consumerName-managers-m.
      operations:
      - method: DELETE
        name: apikeyconsumermanagersdelete
        description: Deletes a Manager
        call: zuplo-api-keys-managers.apikeyconsumermanagersdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
