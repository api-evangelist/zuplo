    resources:
    - path: /v1/v1/accounts/{accountname}/audit-logs
      name: v1-accounts-accountname-audit-logs
      description: REST surface for v1-accounts-accountName-audit-logs.
      operations:
      - method: GET
        name: auditlogsservicelist
        description: Query Audit Logs
        call: zuplo-audit-logs.auditlogsservicelist
        outputParameters:
        - type: object
          mapping: $.
