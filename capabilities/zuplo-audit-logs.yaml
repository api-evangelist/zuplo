    resources:
    - name: v1-accounts-accountName-audit-logs
      path: /v1/accounts/{accountName}/audit-logs
      operations:
      - name: auditlogsservicelist
        method: GET
        description: Query Audit Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZUPLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zuplo-audit-logs-rest
    port: 8080
    description: REST adapter for Zuplo Developer API — Audit Logs. One Spectral-compliant resource per consumed operation,
