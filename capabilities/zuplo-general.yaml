naftiko: 1.0.0-alpha2
info:
  label: Zuplo Developer API
  description: 'Zuplo Developer API. 2 operations. Lead operation: OpenAPI Specification. Self-contained Naftiko capability
    covering one Zuplo business surface.'
  tags:
  - Zuplo
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUPLO_API_KEY: ZUPLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: zuplo-general
    baseUri: https://dev.zuplo.com
    description: Zuplo Developer API business capability. Self-contained, no shared references.
    resources:
    - name: openapi
      path: /openapi
      operations:
      - name: openapi
        method: GET
        description: OpenAPI Specification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-who-am-i
      path: /v1/who-am-i
      operations:
      - name: v1whoami
        method: GET
        description: Who Am I
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZUPLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zuplo-general-rest
    port: 8080
    description: REST adapter for Zuplo Developer API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/openapi
      name: openapi
      description: REST surface for openapi.
      operations:
      - method: GET
        name: openapi
        description: OpenAPI Specification
        call: zuplo-general.openapi
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/who-am-i
      name: v1-who-am-i
      description: REST surface for v1-who-am-i.
      operations:
      - method: GET
        name: v1whoami
        description: Who Am I
        call: zuplo-general.v1whoami
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zuplo-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zuplo Developer API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: openapi-specification
      description: OpenAPI Specification
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zuplo-general.openapi
      outputParameters:
      - type: object
        mapping: $.
    - name: who-am-i
      description: Who Am I
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zuplo-general.v1whoami
      outputParameters:
      - type: object
        mapping: $.
